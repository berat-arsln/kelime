    <title>KELİME OYUNU - V4.1 (Sözlük Destekli)</title>
    <style>
        :root {
            --bg: #1a0b45;
            --tile-empty: #b0a4d4;
            --correct: #46b5a3;
            --present: #f2a93b;
            --absent: #3a3a3c;
            --key-bg: #4a4a4e;
            --selected: #ffd700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: black; margin: 0; padding: 0; font-family: sans-serif; width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        header { height: 40px; display: flex; align-items: center; justify-content: center; color: var(--selected); font-weight: bold; }
        
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .board-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .tile { width: 50px; height: 50px; background-color: var(--tile-empty); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: bold; color: #1a0b45; text-transform: uppercase; border: 2px solid transparent; }
        
        .tile.active-selection { border: 3px solid var(--selected) !important; background-color: white !important; color: #1a0b45 !important; transform: scale(1.08); }
        .tile[data-state="correct"] { background-color: var(--correct) !important; color: white; border: none; }
        .tile[data-state="present"] { background-color: var(--present) !important; color: white; border: none; }
        .tile[data-state="absent"] { background-color: var(--absent) !important; color: white; border: none; opacity: 0.4; }

        #reset-area { height: 70px; display: flex; align-items: center; justify-content: center; gap: 60px; }
        .action-btn { background: var(--selected); color: #1a0b45; border: none; padding: 20px 20px; border-radius: 3px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        #submit-btn { background: #ffffff; }
        .action-btn:active { transform: scale(0.9); opacity: 0.8; }

        #keyboard { background: rgba(0, 0, 0, 0.9); padding: 5px 10px 40px 5px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .key { background-color: var(--key-bg); border: none; border-radius: 5px; color: white; font-size: 1rem; font-weight: bold; height: 50px; flex: 0.9; display: flex; align-items: center; justify-content: center; }
        .key.wide { flex: 2; background-color: #5d5d61; }
        .key[data-state="correct"] { background-color: var(--correct); }
        .key[data-state="present"] { background-color: var(--present); }
        .key[data-state="absent"] { opacity: 0.2; background-color: #222; }

        #msg { height: 35px; text-align: center; font-weight: bold; color: var(--selected); }

        /* MODAL GÜNCELLEME */
        #game-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; 
            flex-direction: column; padding: 30px; text-align: center;
        }
        .modal-content { background: #2a1b55; padding: 25px; border-radius: 20px; border: 2px solid var(--selected); max-width: 400px; }
        #modal-title { font-size: 1.5rem; margin-bottom: 10px; }
        #target-word { font-size: 2rem; color: var(--selected); margin-bottom: 10px; letter-spacing: 3px; }
        #word-meaning { font-style: italic; color: #ccc; margin-bottom: 20px; line-height: 1.4; border-top: 1px solid #444; padding-top: 10px; }
        .close-btn { background: var(--selected); color: #1a0b45; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>

const loseImages = ["https://i.ibb.co/pBWP2LGt/nah2.jpg","https://i.ibb.co/r2rLzttG/goril.jpg","https://i.ibb.co/FbwZfS4P/images-1.jpg","https://i.makeagif.com/media/9-01-2021/oPiDnx.gif"];

// KELİME LİSTESİ (Kodun geri kalanı için w5 değişkeni)
const w5 = Object.keys(dictionary);

let target = "", curTile = 0, curRow = 0, isDone = false;

function initGame() {
    target = w5[Math.floor(Math.random() * w5.length)].toUpperCase();
    curTile = 0;
    curRow = 0;
    isDone = false;
    document.getElementById('msg').innerText = "";
    
    // Board oluşturma
    const board = document.getElementById('board');
    board.innerHTML = "";
    for(let i=0; i<30; i++) {
        const t = document.createElement('div');
        t.className = 'tile';
        t.id = 't' + i;
        t.onclick = () => st(i);
        board.appendChild(t);
        if(i % 5 === 4) {
            const rowBreak = document.createElement('div');
            rowBreak.className = 'board-row';
            // Sadece görsel düzen için
        }
    }
    // Board rowları div içine alalım
    let html = "";
    for(let r=0; r<6; r++) {
        html += '<div class="board-row">';
        for(let c=0; c<5; c++) {
            let id = r*5+c;
            html += `<div class="tile" id="t${id}" onclick="st(${id})"></div>`;
        }
        html += '</div>';
    }
    board.innerHTML = html;

    document.querySelectorAll('.key').forEach(k => k.removeAttribute('data-state'));
    st(0);
}

function st(id) {
    if(isDone) return;
    if(Math.floor(id / 5) === curRow) {
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('active-selection'));
        curTile = id;
        document.getElementById('t' + id).classList.add('active-selection');
    }
}

function resetGame() {
    initGame();
}

function handleSubmit() {
    if(isDone) return;
    let full = true;
    for(let i=curRow*5; i<(curRow+1)*5; i++) if(document.getElementById('t'+i).innerText==="") full=false;
    if(full) checkRow();
}

function showResultModal(won) {
    const modal = document.getElementById('game-modal');
    const title = document.getElementById('modal-title');
    const targetText = document.getElementById('target-word');
    const meaningText = document.getElementById('word-meaning');
    const resultImg = document.getElementById('result-image'); // Görsel elementi

    title.innerText = won ? "TEBRİKLER! 🎉" : "MAALESEF BİLEMEDİN!";
    title.style.color = won ? "var(--correct)" : "#ff4444";
    targetText.innerText = target;
    meaningText.innerText = dictionary[target] || "Anlam bulunamadı.";

 // Kaybetme durumunda görseli göster
if (!won) {
    // Listeden rastgele bir görsel seç
    const randomImg = loseImages[Math.floor(Math.random() * loseImages.length)];
    
    // Seçilen görseli ekrana bas
    resultImg.src = randomImg;
    resultImg.style.display = 'block';
} else {
    resultImg.style.display = 'none';
}


    modal.style.display = 'flex';
}


function closeModal() {
    document.getElementById('game-modal').style.display = 'none';
}

// Klavye Tanımlama
const keys = [
    ['Q','W','E','R','T','Y','U','I','O','P','Ğ','Ü'],
    ['A','S','D','F','G','H','J','K','L','Ş','İ'],
    ['Z','X','C','V','B','N','M','Ö','Ç','SİL']
];

function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = "";
    keys.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'kb-row';
        row.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'key' + (key === 'SİL' ? ' wide' : '');
            btn.innerText = key;
            btn.onclick = () => handleInput(key);
            rowDiv.appendChild(btn);
        });
        kb.appendChild(rowDiv);
    });
}

function handleInput(val) {
    if(isDone) return;
    if(val === 'SİL') {
        document.getElementById('t' + curTile).innerText = "";
        if(curTile > curRow * 5) st(curTile - 1);
    } else {
        document.getElementById('t' + curTile).innerText = val;
        if(curTile < (curRow+1)*5-1) st(curTile + 1);
    }
}

function checkRow() {
    let guess = "";
    for(let i=curRow*5; i<(curRow+1)*5; i++) guess += document.getElementById('t'+i).innerText;
    
    let tKopya = target.split(''), res = new Array(5).fill('absent');

    for(let i=0; i<5; i++) {
        if(guess[i] === target[i]) {
            res[i] = 'correct';
            tKopya[i] = null;
        }
    }
    for(let i=0; i<5; i++) {
        if(res[i] !== 'correct' && tKopya.includes(guess[i])) {
            res[i] = 'present';
            tKopya[tKopya.indexOf(guess[i])] = null;
        }
    }

    for(let i=0; i<5; i++) {
        const tile = document.getElementById('t' + (curRow*5 + i));
        tile.classList.remove('active-selection');
        tile.setAttribute('data-state', res[i]);
        updKy(guess[i], res[i]);
    }

    if(guess === target) {
        isDone = true;
        setTimeout(() => showResultModal(true), 500);
    } else {
        curRow++;
        if(curRow === 6) {
            isDone = true;
            setTimeout(() => showResultModal(false), 500);
        } else {
            st(curRow * 5);
        }
    }
}

function updKy(h, d) {
    document.querySelectorAll('.key').forEach(k => {
        if(k.innerText === h) {
            const o = k.getAttribute('data-state');
            if(o === 'correct') return;
            if(o === 'present' && d !== 'correct') return;
            k.setAttribute('data-state', d);
        }
    });
}

// Başlat
buildKeyboard();
initGame();
</script>
