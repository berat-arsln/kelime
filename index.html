<script>
    // --‐------ KELİME LİSTESİ------------//
let dictionary = {};

    async function loadDictionary() {
    try {
        const response = await fetch('./words.json');
        if (!response.ok) throw new Error('HTTP hata: ' + response.status);
        dictionary = await response.json();
        w5 = Object.keys(dictionary);
    } catch(err) {
        console.error('Sözlük yüklenemedi:', err);
    }
    }
    
    // ----------KELİME LİSTESİ SONU ------------//

const loseImages = ["https://i.ibb.co/pBWP2LGt/nah2.jpg","https://i.ibb.co/r2rLzttG/goril.jpg","https://i.ibb.co/FbwZfS4P/images-1.jpg","https://i.makeagif.com/media/9-01-2021/oPiDnx.gif"];

// KELİME LİSTESİ (Kodun geri kalanı için w5 değişkeni)
let w5 = Object.keys(dictionary);

let target = "", curTile = 0, curRow = 0, isDone = false;
let hintUsed = false; 
const roastMessages = [
    "Daha 5 harfli kelimeyi bulamıyorsun, bir de ipucu mu istiyorsun?",
    "Beynin mi durdu yoksa hep mi böyleydin?",
    "Sana ipucu değil, mucize lazım.",
    "Sözlükte 'yetersiz' diye arat, belki kendini bulursun.",
    "İpucu versem de bilebileceğinden emin değilim...",
    "Buralarda yenisin galiba, bu kadar zorlanmamalısın."
];

function initGame() {
    target = w5[Math.floor(Math.random() * w5.length)].toUpperCase();
    curTile = 0;
    curRow = 0;
    isDone = false;
    document.getElementById('msg').innerText = "";
    
    // Board oluşturma
    const board = document.getElementById('board');
    board.innerHTML = "";
    for(let i=0; i<30; i++) {
        const t = document.createElement('div');
        t.className = 'tile';
        t.id = 't' + i;
        t.onclick = () => st(i);
        board.appendChild(t);
        if(i % 5 === 4) {
            const rowBreak = document.createElement('div');
            rowBreak.className = 'board-row';
            // Sadece görsel düzen için
        }
    }
    // Board rowları div içine alalım
    let html = "";
    for(let r=0; r<6; r++) {
        html += '<div class="board-row">';
        for(let c=0; c<5; c++) {
            let id = r*5+c;
            html += `<div class="tile" id="t${id}" onclick="st(${id})"></div>`;
        }
        html += '</div>';
    }
    board.innerHTML = html;

    document.querySelectorAll('.key').forEach(k => k.removeAttribute('data-state'));
    st(0);
}

function st(id) {
    if(isDone) return;
    if(Math.floor(id / 5) === curRow) {
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('active-selection'));
        curTile = id;
        document.getElementById('t' + id).classList.add('active-selection');
    }
}

function showHint() {
    if (hintUsed || isDone) {
        if(hintUsed) showToast("Yavaş lan kaç tane alıyon!");
        return;

function handleSubmit() {
    // 1. Mevcut satırdaki harf sayısını kontrol et
    // (Senin kodunda o anki kutucuk sayısını veren değişkeni bulmalısın, genelde curTile % 5 gibi bir mantıktır)
    
    // Eğer 5 harf dolmadıysa titret:
    const startTile = curRow * 5;
    const endTile = startTile + 5;
    let filledTiles = 0;

    for (let i = startTile; i < endTile; i++) {
        if (document.getElementById('t' + i).innerText !== "") {
            filledTiles++;
        }
    }

    if (filledTiles < 5) {
        // Eksik harf var! O satırdaki kutuları titret
        for (let i = startTile; i < endTile; i++) {
            const tile = document.getElementById('t' + i);
            tile.classList.add('shake');
            
            // 300ms sonra shake sınıfını kaldır
            setTimeout(() => {
                tile.classList.remove('shake');
            }, 300);
        }
        return; // Fonksiyonu durdur, kontrol etme
    }

    // --- BURADAN SONRASI SENİN MEVCUT KODLARIN (Kelime doğru mu kontrolü) ---

    if(isDone) return;
    let full = true;
    for(let i=curRow*5; i<(curRow+1)*5; i++) if(document.getElementById('t'+i).innerText==="") full=false;
    if(full) checkRow();
}

function handleInput(val) {
    if(isDone) return;
    
    if(val === 'SİL') {
        const currentTileElement = document.getElementById('t' + curTile);
        
        // 1. Durum: Eğer şu anki kutuda bir harf varsa, sadece harfi sil, yerinde kal.
        if (currentTileElement.innerText !== "") {
            currentTileElement.innerText = "";
        } 
        // 2. Durum: Eğer şu anki kutu zaten boşsa ve satırın başına gelmediysek, bir öncekine geç.
        else if (curTile > curRow * 5) {
            st(curTile - 1); // Bir önceki kutuyu seçer
        }
    } else {
        // Harf ekleme kısmı (Burası aynı kalıyor)
        document.getElementById('t' + curTile).innerText = val;
        if(curTile < (curRow+1)*5-1) st(curTile + 1);
    }
}


function checkRow() {
    let guess = "";
    for(let i=curRow*5; i<(curRow+1)*5; i++) guess += document.getElementById('t'+i).innerText;
    if (!dictionary[guess]) {
        showToast("Bu kelime sözlükte yok!");
        for (let i = curRow * 5; i < (curRow + 1) * 5; i++) {
            const tile = document.getElementById('t' + i);
            tile.classList.add('shake');
            setTimeout(() => tile.classList.remove('shake'), 300);
        }
        return;
    }
    let tKopya = target.split(''), res = new Array(5).fill('absent');

    for(let i=0; i<5; i++) {
        if(guess[i] === target[i]) {
            res[i] = 'correct';
            tKopya[i] = null;
        }
    }
    for(let i=0; i<5; i++) {
        if(res[i] !== 'correct' && tKopya.includes(guess[i])) {
            res[i] = 'present';
            tKopya[tKopya.indexOf(guess[i])] = null;
        }
    }

    for(let i=0; i<5; i++) {
    const tile = document.getElementById('t' + (curRow * 5 + i));
    
    // --- YENİ EKLENECEK KISIM (SIRAYLA TAKLA ATMA) ---
    setTimeout(() => {
        tile.classList.add('flip'); // Harfe takla attır
        
        // Renk değişimlerini animasyonun ortasında (0.3sn sonra) yaparsan daha şık durur
        setTimeout(() => {
            tile.classList.remove('active-selection');
            tile.setAttribute('data-state', res[i]);
            updKy(guess[i], res[i]);
        }, 300);

        // Animasyon bitince sınıfı temizle (bir sonraki tahmin için)
        setTimeout(() => {
            tile.classList.remove('flip');
        }, 600);

    }, i * 200); // i*200 sayesinde harfler soldan sağa sırayla döner
    // ----------------------------------------------
}


    if(guess === target) {
        isDone = true;
        setTimeout(() => showResultModal(true), 500);
    } else {
        curRow++;
        if(curRow === 6) {
            isDone = true;
            setTimeout(() => showResultModal(false), 500);
        } else {
            st(curRow * 5);
        }
    }
}

function updKy(h, d) {
    document.querySelectorAll('.key').forEach(k => {
        if(k.innerText === h) {
            const o = k.getAttribute('data-state');
            if(o === 'correct') return;
            if(o === 'present' && d !== 'correct') return;
            k.setAttribute('data-state', d);
        }
    });
}

function getStats() {
    const data = localStorage.getItem('kelimeStats');
    if (!data) return { profiles: { "GENEL": { played: 0, won: 0, streak: 0, bestStreak: 0, distribution: [0,0,0,0,0,0,0] } } };
    return JSON.parse(data);
}

function saveStats(data) {
    localStorage.setItem('kelimeStats', JSON.stringify(data));
    syncToFirebase(data);
}

async function syncToFirebase(data) {
    try {
        const db = window.firebaseDB;
        const ref = window.firebaseRef;
        const set = window.firebaseSet;
        if (!db) return;
        await set(ref(db, 'istatistik'), data);
    } catch(err) {
        console.error('Firebase kayıt hatası:', err);
    }
}

async function loadFromFirebase() {
    try {
        const db = window.firebaseDB;
        const ref = window.firebaseRef;
        const get = window.firebaseGet;
        if (!db) return;
        const snapshot = await get(ref(db, 'istatistik'));
        if (snapshot.exists()) {
            const data = snapshot.val();
            localStorage.setItem('kelimeStats', JSON.stringify(data));
            renderTabs();
            renderStatsContent();
        }
    } catch(err) {
        console.error('Firebase yükleme hatası:', err);
    }
}

function renderTabs() {
    const data = getStats();

        const btn = document.createElement('button');
        btn.innerText = name;

            font-size: 0.85rem;
            user-select: none;
        `;

        let holdTimer = null;

        btn.addEventListener('mousedown', () => {
            isHolding = false;
            if (name !== 'GENEL') {
                holdTimer = setTimeout(() => {
                    isHolding = true;
                    showPasswordPrompt(() => {
    if (!confirm(`"${name}" profilini silmek istiyor musun? Bu işlem geri alınamaz!`)) return;

    if (activeProfile === name) activeProfile = 'GENEL';
    renderTabs();

            }
        });
        btn.addEventListener('mouseup', () => clearTimeout(holdTimer));

        btn.addEventListener('click', () => {
            if (!isHolding) {
                activeProfile = name;
                renderTabs();
                renderStatsContent();
            }
        });

        if (name !== 'GENEL') {

                    showPasswordPrompt(() => {
           if (!confirm(`"${name}" profilini silmek istiyor musun? Bu işlem geri alınamaz!`)) return;
           const data = getStats();
           delete data.profiles[name];
           saveStats(data);
           if (activeProfile === name) activeProfile = 'GENEL';
           renderTabs();
           renderStatsContent();
});
                }, 1000);
            });
            btn.addEventListener('touchend', () => {
                clearTimeout(holdTimer);
                if (!isHolding) {
                    activeProfile = name;
                    renderTabs();
                    renderStatsContent();
                }
            });
        } else {
            btn.addEventListener('touchend', () => {

                renderStatsContent();
            });
        }

    });

    const contentDiv = document.getElementById('stats-content');
    const maxVal = Math.max(...profile.distribution, 1);
    const distLabels = ['1', '2', '3', '4', '5', '6', '❌'];

    let barsHTML = distLabels.map((label, i) => {
        const val = profile.distribution[i] || 0;
        const width = Math.max((val / maxVal) * 100, 8);
        const isHighlight = isPostGame && lastGuessNumber === i;
        const barColor = isHighlight ? '#46b5a3' : '#ffd700';

            <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">

function recordGameResult(won, guessIndex) {
    const data = getStats();
    if (!data.profiles[activeProfile]) {
        data.profiles[activeProfile] = { played: 0, won: 0, streak: 0, bestStreak: 0, distribution: [0,0,0,0,0,0,0] };
    }
    const profile = data.profiles[activeProfile];
    profile.played++;
    if (won) {
        profile.won++;
        profile.streak = (profile.streak || 0) + 1;
        if (profile.streak > (profile.bestStreak || 0)) profile.bestStreak = profile.streak;
    } else {
        profile.streak = 0;
    }
    profile.distribution[guessIndex] = (profile.distribution[guessIndex] || 0) + 1;
    saveStats(data);
    lastGuessNumber = guessIndex;
}

            <textarea id="export-code-area" readonly style="width:100%;height:100px;background:#1a0b45;color:#46b5a3;border:1px solid #46b5a3;border-radius:10px;padding:10px;font-size:0.7rem;resize:none;word-break:break-all;"></textarea>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:14px;">
                <button id="copy-code-btn" style="background:#46b5a3;color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:bold;cursor:pointer;">📋 Kopyala</button>
                <button onclick="document.getElementById('code-box').remove()" style="background:#555;color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:bold;cursor:pointer;">KAPAT</button>
            </div>
        </div>
    `;
    document.body.appendChild(box);
    document.getElementById('export-code-area').value = code;
    document.getElementById('copy-code-btn').onclick = function() {
        const area = document.getElementById('export-code-area');
        area.select();
        area.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(area.value)
            .then(() => alert('Kod kopyalandı!'))
            .catch(() => { area.select(); alert('Kodu manuel kopyala!'); });
    };
}

function showImportCode() {
    const box = document.createElement('div');
    box.id = 'import-box';
    box.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
    box.innerHTML = `
        <div style="background:#2a1b55;border:2px solid #ffd700;border-radius:20px;padding:24px;width:90%;max-width:400px;text-align:center;">
            <div style="color:#ffd700;font-weight:bold;font-size:1rem;margin-bottom:12px;">📥 KOD İLE YÜKLE</div>
            <div style="color:#aaa;font-size:0.75rem;margin-bottom:12px;">Daha önce aldığın yedek kodunu buraya yapıştır.</div>
            <textarea id="import-code-input" style="width:100%;height:100px;background:#1a0b45;color:#46b5a3;border:1px solid #46b5a3;border-radius:10px;padding:10px;font-size:0.7rem;resize:none;word-break:break-all;" placeholder="Kodu buraya yapıştır..."></textarea>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:14px;">
                <button onclick="loadFromCode()" style="background:#ffd700;color:#1a0b45;border:none;border-radius:10px;padding:10px 20px;font-weight:bold;cursor:pointer;">YÜKLE</button>
                <button onclick="document.getElementById('import-box').remove()" style="background:#555;color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:bold;cursor:pointer;">KAPAT</button>
            </div>
        </div>
    `;
    document.body.appendChild(box);
}

function loadFromCode() {
    const code = document.getElementById('import-code-input').value.trim();
    if (!code) { alert('Kod boş!'); return; }
    try {
        const json = decodeURIComponent(atob(code));
        const data = JSON.parse(json);
        if (!data.profiles) { alert('Geçersiz kod!'); return; }
        saveStats(data);
        activeProfile = 'GENEL';
        renderTabs();
        renderStatsContent();
        document.getElementById('import-box').remove();
        alert('İstatistikler başarıyla yüklendi!');
    } catch(err) {
        alert('Kod okunamadı, geçersiz!');
    }
}
function initResetButtons() {
    const btnProfile = document.getElementById('reset-profile-btn');
    const btnAll = document.getElementById('reset-all-btn');

    function addHold(btn, action) {
        let timer = null;
        let holding = false;

        btn.addEventListener('mousedown', () => { holding = false; timer = setTimeout(() => { holding = true; action(); }, 1000); });
        btn.addEventListener('mouseup', () => clearTimeout(timer));
        btn.addEventListener('mouseleave', () => clearTimeout(timer));
        btn.addEventListener('touchstart', () => { holding = false; timer = setTimeout(() => { holding = true; action(); }, 1000); });
        btn.addEventListener('touchend', () => clearTimeout(timer));
        btn.addEventListener('click', (e) => { if (holding) e.preventDefault(); });
    }

    addHold(btnProfile, resetActiveProfile);
    addHold(btnAll, resetAllProfiles);
}
